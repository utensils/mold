[package]
name = "mold-inference"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Candle-based FLUX inference engine for mold"

[features]
default = []
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
metal = ["candle-core/metal", "candle-nn/metal", "candle-transformers/metal"]

[dependencies]
mold-core = { path = "../mold-core" }
anyhow = "1"
candle-core = { git = "https://github.com/huggingface/candle", branch = "main" }
candle-nn = { git = "https://github.com/huggingface/candle", branch = "main" }
candle-transformers = { git = "https://github.com/huggingface/candle", branch = "main" }
image = "0.25"
safetensors = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokenizers = "0.21"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
