[package]
name = "mold-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI and TUI for mold — AI image generation"

[[bin]]
name = "mold"
path = "src/main.rs"

[dependencies]
mold-core = { path = "../mold-core" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
colored = "3"
crossterm = "0.28"
dirs = "6"
indicatif = "0.17"
ratatui = "0.29"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
