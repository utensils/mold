name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-14
    env:
      CARGO_INCREMENTAL: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-release
          cache-on-failure: true

      - name: Build (Metal)
        run: cargo build --release -p mold-ai --features metal,preview,discord,expand,tui,webp,mp4,metrics

      - name: Ad-hoc code sign
        run: codesign -s - target/release/mold

      - name: Package
        run: tar -czf mold-aarch64-apple-darwin.tar.gz -C target/release mold

      - uses: actions/upload-artifact@v7
        with:
          name: mold-aarch64-apple-darwin
          path: mold-aarch64-apple-darwin.tar.gz

  # Ada Lovelace (RTX 40-series, sm_89)
  build-linux-sm89:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang lld nasm

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.8.1"
          method: local
          log-file-suffix: sm89

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-cuda-sm89-release
          cache-on-failure: true

      - name: Build (CUDA sm_89)
        env:
          CUDA_COMPUTE_CAP: "89"
          LIBRARY_PATH: /usr/local/cuda/lib64/stubs
        run: cargo build --release -p mold-ai --features cuda,preview,discord,expand,tui,webp,mp4,metrics

      - name: Package
        run: tar -czf mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz -C target/release mold

      - uses: actions/upload-artifact@v7
        with:
          name: mold-x86_64-unknown-linux-gnu-cuda-sm89
          path: mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz

  # Blackwell (RTX 50-series, sm_120)
  build-linux-sm120:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang lld nasm

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.8.1"
          method: local
          log-file-suffix: sm120

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-cuda-sm120-release
          cache-on-failure: true

      - name: Build (CUDA sm_120)
        env:
          CUDA_COMPUTE_CAP: "120"
          LIBRARY_PATH: /usr/local/cuda/lib64/stubs
        run: cargo build --release -p mold-ai --features cuda,preview,discord,expand,tui,webp,mp4,metrics

      - name: Package
        run: tar -czf mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz -C target/release mold

      - uses: actions/upload-artifact@v7
        with:
          name: mold-x86_64-unknown-linux-gnu-cuda-sm120
          path: mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz

  # Docker image — build and push to GHCR
  # Tags: `latest` on main, `v1.2.3` + `latest` on version tags
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - cuda_cap: "89"
            suffix: ""
            tag_suffix: ""
          - cuda_cap: "80"
            suffix: "-sm80"
            tag_suffix: "-sm80"
          - cuda_cap: "120"
            suffix: "-sm120"
            tag_suffix: "-sm120"
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_COMPUTE_CAP=${{ matrix.cuda_cap }}
          cache-from: type=gha,scope=docker${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=docker${{ matrix.suffix }}

  # Rolling pre-release on every push to main
  release-latest:
    if: github.ref == 'refs/heads/main'
    needs: [build-macos, build-linux-sm89, build-linux-sm120]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: false
          files: |
            artifacts/mold-aarch64-apple-darwin.tar.gz
            artifacts/mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz
            artifacts/mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz
            artifacts/SHA256SUMS
          body: |
            Rolling pre-release — updated on every push to `main`.

            **Commit:** ${{ github.sha }}

            ## Download

            | Platform | GPU | File |
            |----------|-----|------|
            | macOS Apple Silicon | Metal | `mold-aarch64-apple-darwin.tar.gz` |
            | Linux x86_64 | CUDA — RTX 40-series (Ada Lovelace) | `mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz` |
            | Linux x86_64 | CUDA — RTX 50-series (Blackwell) | `mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz` |

            The install script auto-detects your GPU:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/utensils/mold/main/install.sh | sh
            ```

            Manual install:
            ```bash
            # macOS
            tar xzf mold-aarch64-apple-darwin.tar.gz
            xattr -d com.apple.quarantine mold  # if needed
            ./mold version

            # Linux (requires NVIDIA driver + CUDA runtime)
            tar xzf mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz   # RTX 40-series
            tar xzf mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz  # RTX 50-series
            ./mold version
            ```

  # Versioned release + crates.io publish on v* tags
  release-version:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux-sm89, build-linux-sm120]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          files: |
            artifacts/mold-aarch64-apple-darwin.tar.gz
            artifacts/mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz
            artifacts/mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # One-line install (auto-detects GPU, pinned to this release)
            curl -fsSL https://raw.githubusercontent.com/utensils/mold/${{ github.ref_name }}/install.sh | MOLD_VERSION=${{ github.ref_name }} sh

            # From crates.io (CPU-only, no GPU acceleration)
            cargo install mold-ai

            # From source with GPU support
            cargo install --git https://github.com/utensils/mold --tag ${{ github.ref_name }} --features metal,preview,discord,expand,tui,webp,mp4,metrics  # macOS
            cargo install --git https://github.com/utensils/mold --tag ${{ github.ref_name }} --features cuda,preview,discord,expand,tui,webp,mp4,metrics   # Linux

            # Nix
            nix run github:utensils/mold/${{ github.ref_name }}
            ```

            ## Download pre-built binaries

            | Platform | GPU | File |
            |----------|-----|------|
            | macOS Apple Silicon | Metal | `mold-aarch64-apple-darwin.tar.gz` |
            | Linux x86_64 | CUDA — RTX 40-series (Ada) | `mold-x86_64-unknown-linux-gnu-cuda-sm89.tar.gz` |
            | Linux x86_64 | CUDA — RTX 50-series (Blackwell) | `mold-x86_64-unknown-linux-gnu-cuda-sm120.tar.gz` |

  # Publish to crates.io on v* tags
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish mold-ai-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-core

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai-inference
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-inference

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai-discord
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-discord

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-server

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-tui

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai
