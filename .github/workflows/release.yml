name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-release
          cache-on-failure: true

      - name: Build (Metal)
        run: cargo build --release -p mold-ai --features metal

      - name: Ad-hoc code sign
        run: codesign -s - target/release/mold

      - name: Package
        run: tar -czf mold-aarch64-apple-darwin.tar.gz -C target/release mold

      - uses: actions/upload-artifact@v4
        with:
          name: mold-aarch64-apple-darwin
          path: mold-aarch64-apple-darwin.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.6.3"
          method: local

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-cuda-release
          cache-on-failure: true

      - name: Build (CUDA)
        env:
          CUDA_COMPUTE_CAP: "89"
          LIBRARY_PATH: /usr/local/cuda/lib64/stubs
        run: cargo build --release -p mold-ai --features cuda

      - name: Package
        run: tar -czf mold-x86_64-unknown-linux-gnu-cuda.tar.gz -C target/release mold

      - uses: actions/upload-artifact@v4
        with:
          name: mold-x86_64-unknown-linux-gnu-cuda
          path: mold-x86_64-unknown-linux-gnu-cuda.tar.gz

  # Rolling pre-release on every push to main
  release-latest:
    if: github.ref == 'refs/heads/main'
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: false
          files: |
            artifacts/mold-aarch64-apple-darwin.tar.gz
            artifacts/mold-x86_64-unknown-linux-gnu-cuda.tar.gz
            artifacts/SHA256SUMS
          body: |
            Rolling pre-release — updated on every push to `main`.

            **Commit:** ${{ github.sha }}

            ## Download

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (Metal) | `mold-aarch64-apple-darwin.tar.gz` |
            | Linux x86_64 (CUDA) | `mold-x86_64-unknown-linux-gnu-cuda.tar.gz` |

            ```bash
            # macOS
            tar xzf mold-aarch64-apple-darwin.tar.gz
            xattr -d com.apple.quarantine mold  # if needed
            ./mold version

            # Linux (requires NVIDIA driver + CUDA runtime)
            tar xzf mold-x86_64-unknown-linux-gnu-cuda.tar.gz
            ./mold version
            ```

  # Versioned release + crates.io publish on v* tags
  release-version:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          files: |
            artifacts/mold-aarch64-apple-darwin.tar.gz
            artifacts/mold-x86_64-unknown-linux-gnu-cuda.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # From crates.io (CPU-only, no GPU acceleration)
            cargo install mold-ai

            # From source with GPU support
            cargo install --git https://github.com/utensils/mold --features metal  # macOS
            cargo install --git https://github.com/utensils/mold --features cuda   # Linux

            # Nix
            nix run github:utensils/mold
            ```

            ## Download pre-built binaries

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (Metal) | `mold-aarch64-apple-darwin.tar.gz` |
            | Linux x86_64 (CUDA) | `mold-x86_64-unknown-linux-gnu-cuda.tar.gz` |

  # Publish to crates.io on v* tags
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish mold-ai-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-core

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai-inference
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-inference

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai-server

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mold-ai
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mold-ai
