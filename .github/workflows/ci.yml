name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Note: CUDA builds are not run in CI — they require a GPU host with NixOS + CUDA.
# CI only checks non-CUDA compilation, lints, and tests.
#
# Cache strategy: jobs that compile the same features share a cache key.
# Only main-branch pushes save caches; PRs read from main's cache.

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install docs dependencies
        working-directory: website
        run: bun install
      - name: Check docs formatting
        working-directory: website
        run: bun run fmt:check
      - name: Verify docs references
        working-directory: website
        run: bun run verify
      - name: Build docs
        working-directory: website
        run: bun run build

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-default
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check
        run: cargo check --workspace

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-default
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-default
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Test
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-default
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  check-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-all-features
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system deps for optional features
        run: sudo apt-get update && sudo apt-get install -y nasm libwebp-dev
      - name: Check with all features (preview, discord, expand, tui, webp, mp4)
        run: cargo check -p mold-ai --features preview,discord,expand,tui,webp,mp4
