# pre-commit (https://pre-commit.com) hook config.
#
# Devs using `nix develop` already get `trufflehog` and `pre-commit` on $PATH.
# Other contributors: install `trufflehog` (e.g. `brew install trufflehog`,
# `go install github.com/trufflesecurity/trufflehog/v3@latest`, or download
# from https://github.com/trufflesecurity/trufflehog/releases) and run
# `pre-commit install` once — `default_install_hook_types` below wires up
# both pre-commit and pre-push automatically.
#
# CI (.github/workflows/ci.yml `secret-scan` job) runs the same scanner on
# every push and PR, so this is a fast local mirror, not the only line of
# defence.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        description: Detect committed credentials with trufflesecurity/trufflehog.
        entry: trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail --no-update
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
