[workspace]
members = [
    "crates/mold-core",
    "crates/mold-inference",
    "crates/mold-server",
    "crates/mold-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["James Brink <brink.james@gmail.com>"]
description = "Local AI image generation CLI — FLUX & SDXL diffusion models on your GPU"
homepage = "https://github.com/utensils/mold"
repository = "https://github.com/utensils/mold"

[workspace.metadata.crane]
name = "mold"

[profile.release]
lto = "fat"
codegen-units = 1
strip = true

# Patch candle to fix Metal quantized matmul producing incorrect results.
# Per-matmul dequantization on Metal: dequantize weight to F32 for each matmul
# call, use standard Metal GEMM, then free the temporary copy. Peak extra memory
# is ~200MB (one layer) instead of ~16GB (full model dequantization).
[patch."https://github.com/huggingface/candle"]
candle-core = { git = "https://github.com/utensils/candle", branch = "mold-metal-fix" }
candle-nn = { git = "https://github.com/utensils/candle", branch = "mold-metal-fix" }
candle-transformers = { git = "https://github.com/utensils/candle", branch = "mold-metal-fix" }

